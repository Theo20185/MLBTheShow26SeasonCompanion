name: Weekly playthrough harness

on:
  schedule:
    - cron: '0 6 * * 1'  # Mondays 06:00 UTC
  workflow_dispatch:

jobs:
  playthrough:
    name: Run end-to-end playthroughs
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run playthrough sweep (--full = 1050 playthroughs)
        run: npm run test:playthrough -- --full

      - name: Upload failure dumps
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playthrough-failures
          path: scripts/.cache/playthrough-failures/
          if-no-files-found: ignore
